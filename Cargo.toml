[features]
dev_tests = []

[package]
name = "secret_scraper"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
pub-fields = "0.1.1"
slog = "2.8.2"
slog-async = "2.8.0"
slog-term = "2.9.2"
tracing = "0.1.44"
tracing-appender = "0.2.5"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "json"] }
